<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>英文單字 OCR 速查</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>英文單字 OCR 速查</h1>
    <p class="hint">按 <kbd>⌘⇧O</kbd> / <kbd>Ctrl+Shift+O</kbd> 或右鍵選單啟動</p>
  </header>

  <main>
    <button id="open-wordlist" class="btn btn-primary">
      <span class="icon">📚</span>
      <span class="label">單字列表</span>
    </button>

    <button id="open-options" class="btn btn-secondary">
      <span class="icon">⚙️</span>
      <span class="label">設定</span>
    </button>
  </main>

  <script src="popup.js"></script>
</body>
</html>
